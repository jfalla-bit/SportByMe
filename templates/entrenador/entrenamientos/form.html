{% extends 'entrenador/base_entrenador.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block nav_entrenamientos %}active{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-8">
<div class="content-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h6 class="fw-bold mb-0"><i class="fas fa-dumbbell me-2 text-warning"></i>{{ titulo }}</h6>
        <a href="/entrenador/mis-entrenamientos/" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left me-1"></i>Volver
        </a>
    </div>
    <form method="post" action=".">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label fw-semibold">Título *</label>
                <input type="text" name="titulo" class="form-control"
                       value="{{ entrenamiento.titulo|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Equipo *</label>
                <select name="equipo" class="form-select" required>
                    <option value="">Seleccionar...</option>
                    {% for e in equipos %}
                    <option value="{{ e.id }}" {% if entrenamiento.equipo_id == e.id %}selected{% endif %}>{{ e.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Lugar</label>
                <input type="text" name="lugar" class="form-control"
                       value="{{ entrenamiento.lugar|default:'' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Fecha *</label>
                <input type="date" name="fecha" class="form-control"
                       value="{{ entrenamiento.fecha|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Hora Inicio *</label>
                <input type="time" name="hora_inicio" class="form-control"
                       value="{{ entrenamiento.hora_inicio|time:'H:i'|default:'' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Hora Fin *</label>
                <input type="time" name="hora_fin" class="form-control"
                       value="{{ entrenamiento.hora_fin|time:'H:i'|default:'' }}" required>
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3">{{ entrenamiento.descripcion|default:'' }}</textarea>
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-warning"><i class="fas fa-save me-1"></i>Guardar</button>
            <a href="/entrenador/mis-entrenamientos/" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}

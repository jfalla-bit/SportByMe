{% extends 'panel/base_panel.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block nav_torneos %}active{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8">
<div class="content-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h6 class="fw-bold mb-0">{{ titulo }}</h6>
        <a href="/panel/torneos/" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Volver</a>
    </div>
    <form method="post" action=".">{% csrf_token %}
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label fw-semibold">Nombre *</label>
                <input type="text" name="nombre" class="form-control" value="{{ torneo.nombre|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Categoría *</label>
                <select name="categoria" class="form-select" required>
                    <option value="">Seleccionar...</option>
                    {% for c in categorias %}
                    <option value="{{ c.id }}" {% if torneo.categoria_id == c.id %}selected{% endif %}>{{ c.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Estado</label>
                <select name="estado" class="form-select">
                    {% for value, label in estados %}
                    <option value="{{ value }}" {% if torneo.estado == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Fecha Inicio *</label>
                <input type="date" name="fecha_inicio" class="form-control" value="{{ torneo.fecha_inicio|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Fecha Fin *</label>
                <input type="date" name="fecha_fin" class="form-control" value="{{ torneo.fecha_fin|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Lugar</label>
                <input type="text" name="lugar" class="form-control" value="{{ torneo.lugar|default:'' }}">
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3">{{ torneo.descripcion|default:'' }}</textarea>
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-info text-white"><i class="fas fa-save me-1"></i>Guardar</button>
            <a href="/panel/torneos/" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
</div></div>
{% endblock %}

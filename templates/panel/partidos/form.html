{% extends 'panel/base_panel.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block nav_partidos %}active{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
<div class="content-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h6 class="fw-bold mb-0"><i class="fas fa-futbol me-2 text-success"></i>{{ titulo }}</h6>
        <a href="/panel/partidos/" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Volver</a>
    </div>
    <form method="post">{% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Equipo Propio *</label>
                <select name="equipo_propio" class="form-select" required>
                    <option value="">Seleccionar...</option>
                    {% for e in equipos %}
                    <option value="{{ e.id }}" {% if partido.equipo_propio_id == e.id %}selected{% endif %}>{{ e.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Equipo Rival *</label>
                <input type="text" name="equipo_rival" class="form-control"
                       placeholder="Nombre del equipo rival"
                       value="{{ partido.equipo_rival|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Fecha *</label>
                <input type="date" name="fecha" class="form-control"
                       value="{{ partido.fecha|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Hora *</label>
                <input type="time" name="hora" class="form-control"
                       value="{{ partido.hora|time:'H:i'|default:'' }}" required>
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Cancha / Ubicación</label>
                <input type="text" name="cancha" class="form-control"
                       placeholder="Ej: Estadio Municipal, Cancha 3..."
                       value="{{ partido.cancha|default:'' }}">
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3"
                          placeholder="Observaciones, indicaciones, etc.">{{ partido.descripcion|default:'' }}</textarea>
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Guardar</button>
            <a href="/panel/partidos/" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
</div></div>
{% endblock %}

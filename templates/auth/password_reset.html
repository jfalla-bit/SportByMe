<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Sistema Deportivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card-header {
            background: linear-gradient(135deg, #e94560, #c62a47);
            border-radius: 16px 16px 0 0;
            padding: 30px;
            text-align: center;
            color: white;
        }
        .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c62a47);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-key fa-2x d-block mb-2"></i>
                    <h5 class="fw-bold mb-1">Recuperar Contraseña</h5>
                    <p class="mb-0 opacity-75 small">Ingresá tu correo y te enviaremos un enlace</p>
                </div>
                <div class="card-body p-4">

                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show py-2">
                            <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %} me-2"></i>
                            {{ message }}
                            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post" action="." novalidate>
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">
                                <i class="fas fa-envelope me-1 text-muted"></i>Correo electrónico
                            </label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="correo@ejemplo.com"
                                   value="{{ email|default:'' }}"
                                   autofocus required>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary text-white">
                                <i class="fas fa-paper-plane me-2"></i>Enviar enlace
                            </button>
                        </div>
                    </form>

                    <div class="text-center">
                        <a href="/auth/login/" class="text-muted small">
                            <i class="fas fa-arrow-left me-1"></i>Volver al inicio de sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - Sistema Deportivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card-header {
            background: linear-gradient(135deg, #e94560, #c62a47);
            border-radius: 16px 16px 0 0;
            padding: 30px;
            text-align: center;
            color: white;
        }
        .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c62a47);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary:hover { opacity: 0.9; }
        .requisitos { font-size: 0.78rem; color: #6c757d; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-lock fa-2x d-block mb-2"></i>
                    <h5 class="fw-bold mb-1">Nueva Contraseña</h5>
                    <p class="mb-0 opacity-75 small">Ingresá tu nueva contraseña</p>
                </div>
                <div class="card-body p-4">

                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show py-2">
                            <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %} me-2"></i>
                            {{ message }}
                            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post" action="." novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold small">
                                <i class="fas fa-lock me-1 text-muted"></i>Nueva contraseña
                            </label>
                            <div class="input-group">
                                <input type="password" name="password1" id="password1"
                                       class="form-control" placeholder="Nueva contraseña"
                                       autofocus required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePass('password1', 'eye1')">
                                    <i class="fas fa-eye" id="eye1"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold small">
                                <i class="fas fa-lock me-1 text-muted"></i>Confirmar contraseña
                            </label>
                            <div class="input-group">
                                <input type="password" name="password2" id="password2"
                                       class="form-control" placeholder="Repetí la contraseña"
                                       required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePass('password2', 'eye2')">
                                    <i class="fas fa-eye" id="eye2"></i>
                                </button>
                            </div>
                        </div>

                        <div class="requisitos mb-4 p-2 bg-light rounded">
                            <i class="fas fa-info-circle me-1"></i>
                            Mínimo 8 caracteres, una mayúscula, una minúscula, un número y un carácter especial.
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary text-white">
                                <i class="fas fa-save me-2"></i>Guardar contraseña
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>

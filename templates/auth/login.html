<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema Deportivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-header {
            background: linear-gradient(135deg, #e94560, #c62a47);
            border-radius: 16px 16px 0 0;
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-header i { font-size: 2.5rem; margin-bottom: 10px; }
        .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #e94560, #c62a47);
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .divider { color: #adb5bd; font-size: 0.85rem; }
        .role-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="card login-card">
                <!-- Header -->
                <div class="login-header">
                    <i class="fas fa-trophy d-block"></i>
                    <h4 class="mb-1 fw-bold">Sistema Deportivo</h4>
                    <p class="mb-0 opacity-75 small">Inicia sesión para continuar</p>
                </div>

                <!-- Body -->
                <div class="card-body p-4">

                    <!-- Mensajes de error/éxito -->
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show py-2" role="alert">
                            <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %} me-2"></i>
                            {{ message }}
                            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}

                    <!-- Formulario -->
                    <form method="post" action="/auth/login/" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold small">
                                <i class="fas fa-envelope me-1 text-muted"></i>Correo electrónico
                            </label>
                            <input
                                type="text"
                                name="email"
                                class="form-control"
                                placeholder="correo@ejemplo.com"
                                value="{{ email|default:'' }}"
                                autocomplete="email"
                                autofocus
                                required
                            >
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold small">
                                <i class="fas fa-lock me-1 text-muted"></i>Contraseña
                            </label>
                            <div class="input-group">
                                <input
                                    type="password"
                                    name="password"
                                    id="password"
                                    class="form-control"
                                    placeholder="Tu contraseña"
                                    autocomplete="current-password"
                                    required
                                >
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword()">
                                    <i class="fas fa-eye" id="eye-icon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-login btn-primary text-white">
                                <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                            </button>
                        </div>
                    </form>

                    <!-- Separador -->
                    <div class="text-center my-3 divider">
                        <span>¿No tienes cuenta?</span>
                    </div>

                    <div class="d-grid">
                        <a href="/auth/signup/" class="btn btn-outline-secondary">
                            <i class="fas fa-user-plus me-2"></i>Crear cuenta nueva
                        </a>
                    </div>

                    <div class="text-center mt-3">
                        <a href="/auth/password-reset/" class="text-muted small">
                            <i class="fas fa-key me-1"></i>¿Olvidaste tu contraseña?
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>

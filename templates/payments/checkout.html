<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagar — {{ pago.descripcion }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { max-width: 480px; width: 100%; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="card p-4">
    <h5 class="fw-bold mb-1"><i class="fas fa-lock me-2 text-success"></i>Pago seguro</h5>
    <p class="text-muted small mb-3">Procesado por Wompi</p>

    <div class="mb-3 p-3 bg-light rounded">
        <div class="small text-muted">Concepto</div>
        <div class="fw-semibold">{{ pago.descripcion }}</div>
        <div class="small text-muted mt-2">Deportista</div>
        <div class="fw-semibold">{{ pago.jugador.usuario.get_full_name|default:pago.jugador.usuario.username }}</div>
        <div class="small text-muted mt-2">Monto</div>
        <div class="fs-4 fw-bold text-success">${{ pago.monto }} COP</div>
    </div>

    <script
        src="https://checkout.wompi.co/widget.js"
        data-render="button"
        data-public-key="{{ public_key }}"
        data-currency="COP"
        data-amount-in-cents="{{ monto_centavos }}"
        data-reference="{{ referencia }}"
        data-signature:integrity="{{ firma }}"
        data-redirect-url="{{ redirect_url }}"
        data-customer-data:email="{{ email }}"
        data-customer-data:full-name="{{ pago.jugador.usuario.get_full_name|default:pago.jugador.usuario.username }}">
    </script>

    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm mt-3 w-100">
        Cancelar y volver
    </a>
</div>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</body>
</html>
